name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (build + test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # embed.FS needs an index.html to exist at build time. Drop a placeholder
      # so `go build ./...` works in CI without running the frontend build.
      # Real releases build the actual frontend via the release workflow.
      - name: Seed embed placeholder
        run: |
          mkdir -p internal/ui/dist
          if [ ! -f internal/ui/dist/index.html ]; then
            echo "<!doctype html><title>ci-placeholder</title>" > internal/ui/dist/index.html
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      # golangci-lint is intentionally deferred to a later release — the
      # upstream action's bundled binary lags the toolchain Go version we
      # target here. `go vet` catches the same-shape issues; re-enable once
      # golangci-lint ships a build compatible with our go.mod directive.

  web:
    name: Web (typecheck + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
