name: CI

# Only runs on PRs. Direct pushes to main skip CI (solo dev convention).
# Tag pushes are handled by the Release workflow, which does its own build
# and test before running goreleaser — no need to duplicate here.
on:
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (build + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # embed.FS needs an index.html to exist at build time. Drop a placeholder
      # so `go build ./...` works in CI without running the frontend build.
      - name: Seed embed placeholder
        run: |
          mkdir -p internal/ui/dist
          if [ ! -f internal/ui/dist/index.html ]; then
            echo "<!doctype html><title>ci-placeholder</title>" > internal/ui/dist/index.html
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  web:
    name: Web (typecheck + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
