run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosec
    - staticcheck
    - govet
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  gosec:
    excludes:
      - G104 # Errors unhandled — handled by errcheck
      - G201 # SQL string formatting — we quote identifiers via pgx.Identifier.Sanitize

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
